name: Feature Request
description: Propose a new capability or workflow improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What are you doing today instead?
  - type: textarea
    id: extra
    attributes:
      label: Extra Context
      description: Add links, examples, or screenshots if helpful.
